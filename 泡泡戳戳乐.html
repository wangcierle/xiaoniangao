<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🌈 英语泡泡乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #score, #target {
            position: absolute;
            font-size: 42px;
            font-weight: bold;
            color: #FF6B6B;
            text-shadow: 3px 3px 0px #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
            pointer-events: none;
        }
        #score { top: 15px; left: 20px; }
        #target {
            top: 15px;
            right: 20px;
            color: #4ECDC4;
            font-size: 36px;
            text-align: right;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.92);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 10;
            padding: 20px;
        }
        .hidden { display: none !important; }
        h1 {
            font-size: 56px;
            color: #FF6B6B;
            text-shadow: 4px 4px 0 #FFE66D;
            margin-bottom: 10px;
            text-align: center;
        }
        h2 {
            font-size: 36px;
            color: #666;
            margin-bottom: 25px;
            text-align: center;
        }
        .btn-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            max-width: 950px;
        }
        .mode-btn {
            font-size: 26px;
            padding: 18px 22px;
            border: none;
            border-radius: 25px;
            background: #FF6B6B;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 0 #D64545, 0 15px 20px rgba(0,0,0,0.2);
            transition: transform 0.1s;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 130px;
        }
        .mode-btn span { font-size: 44px; margin-bottom: 5px; }
        .mode-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #D64545, 0 8px 10px rgba(0,0,0,0.2);
        }
        .mode-btn:nth-child(2) { background: #4ECDC4; box-shadow: 0 8px 0 #2A9D8F, 0 15px 20px rgba(0,0,0,0.2); }
        .mode-btn:nth-child(2):active { box-shadow: 0 4px 0 #2A9D8F, 0 8px 10px rgba(0,0,0,0.2); }
        .mode-btn:nth-child(3) { background: #FFE66D; color: #333; box-shadow: 0 8px 0 #E6C229, 0 15px 20px rgba(0,0,0,0.2); }
        .mode-btn:nth-child(3):active { box-shadow: 0 4px 0 #E6C229, 0 8px 10px rgba(0,0,0,0.2); }
        .mode-btn:nth-child(4) { background: #A29BFE; box-shadow: 0 8px 0 #6C5CE7, 0 15px 20px rgba(0,0,0,0.2); }
        .mode-btn:nth-child(4):active { box-shadow: 0 4px 0 #6C5CE7, 0 8px 10px rgba(0,0,0,0.2); }
        .mode-btn:nth-child(5) { background: #FF9F43; box-shadow: 0 8px 0 #E67E22, 0 15px 20px rgba(0,0,0,0.2); }
        .mode-btn:nth-child(5):active { box-shadow: 0 4px 0 #E67E22, 0 8px 10px rgba(0,0,0,0.2); }
        .mode-btn:nth-child(6) { background: #00B894; box-shadow: 0 8px 0 #00A383, 0 15px 20px rgba(0,0,0,0.2); }
        .mode-btn:nth-child(6):active { box-shadow: 0 4px 0 #00A383, 0 8px 10px rgba(0,0,0,0.2); }

        .big-btn {
            font-size: 36px;
            padding: 20px 50px;
            border: none;
            border-radius: 50px;
            background: #FF6B6B;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 0 #D64545, 0 15px 20px rgba(0,0,0,0.2);
            transition: transform 0.1s;
            margin: 10px;
            font-weight: bold;
        }
        .big-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #D64545, 0 8px 10px rgba(0,0,0,0.2);
        }
        .tip {
            font-size: 24px;
            color: #888;
            margin-top: 20px;
            text-align: center;
            max-width: 600px;
        }
        .speaker-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            color: #888;
            background: rgba(255,255,255,0.8);
            padding: 8px 16px;
            border-radius: 20px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="score">⭐ 0</div>
        <div id="target">找：🎉</div>
        <div class="speaker-hint" id="speakerHint">🔊 点击泡泡听英语发音</div>
    </div>

    <!-- 开始屏幕 -->
    <div id="startScreen" class="screen">
        <div style="font-size:70px; margin-bottom:10px;">🫧</div>
        <h1>英语泡泡乐</h1>
        <h2>选一个玩法</h2>
        <div class="btn-grid">
            <button class="mode-btn" onclick="startGame('letters')"><span>🔤</span>字母 ABC</button>
            <button class="mode-btn" onclick="startGame('numbers')"><span>🔢</span>数字 123</button>
            <button class="mode-btn" onclick="startGame('colors')"><span>🎨</span>颜色 Color</button>
            <button class="mode-btn" onclick="startGame('animals')"><span>🐱</span>动物 Animal</button>
            <button class="mode-btn" onclick="startGame('transportations')"><span>🚗</span>交通工具</button>
            <button class="mode-btn" onclick="startGame('sea')"><span>🐠</span>海洋生物</button>
        </div>
        <div class="tip">戳破泡泡，听英语，学知识！</div>
    </div>

    <!-- 模式确认/教学屏 -->
    <div id="teachScreen" class="screen hidden">
        <div id="teachIcon" style="font-size:100px; margin-bottom:15px;">🔤</div>
        <div id="teachTitle" style="font-size:48px; font-weight:bold; color:#FF6B6B; margin-bottom:10px;">字母模式</div>
        <div id="teachText" style="font-size:28px; color:#666; margin-bottom:30px; text-align:center; max-width:700px;">
            泡泡里会飞出各种字母，<br>点击泡泡听字母的英语发音！
        </div>
        <button class="big-btn" onclick="closeTeach()">开始玩！</button>
    </div>

    <!-- 游戏结束屏 -->
    <div id="gameOverScreen" class="screen hidden">
        <div style="font-size:90px; margin-bottom:10px;">🏆</div>
        <h1>太棒了！</h1>
        <div id="finalScore" style="font-size:44px; color:#4ECDC4; margin-bottom:15px; font-weight:bold;">得分：0</div>
        <div id="learned" style="font-size:26px; color:#666; margin-bottom:25px; text-align:center; max-width:700px;"></div>
        <button class="big-btn" onclick="backToMenu()">再玩一次</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const targetEl = document.getElementById('target');
        const speakerHint = document.getElementById('speakerHint');
        const startScreen = document.getElementById('startScreen');
        const teachScreen = document.getElementById('teachScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const teachIcon = document.getElementById('teachIcon');
        const teachTitle = document.getElementById('teachTitle');
        const teachText = document.getElementById('teachText');
        const finalScoreEl = document.getElementById('finalScore');
        const learnedEl = document.getElementById('learned');

        let width, height;
        let bubbles = [];
        let particles = [];
        let score = 0;
        let gameRunning = false;
        let spawnTimer = 0;
        let animationId;
        let currentMode = 'letters';
        let targetItem = null;
        let targetTimer = 0;
        let learnedSet = new Set();
        let speechReady = false;
        let synth = window.speechSynthesis;
        let voices = [];

        // 学习内容
        const content = {
            letters: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(l => ({ text: l, speak: l, icon: '' })),
            numbers: [
                { text: '1', speak: 'One', icon: '' },
                { text: '2', speak: 'Two', icon: '' },
                { text: '3', speak: 'Three', icon: '' },
                { text: '4', speak: 'Four', icon: '' },
                { text: '5', speak: 'Five', icon: '' },
                { text: '6', speak: 'Six', icon: '' },
                { text: '7', speak: 'Seven', icon: '' },
                { text: '8', speak: 'Eight', icon: '' },
                { text: '9', speak: 'Nine', icon: '' },
                { text: '10', speak: 'Ten', icon: '' }
            ],
            colors: [
                { text: 'Red', speak: 'Red', icon: '🔴', color: '#FF6B6B' },
                { text: 'Blue', speak: 'Blue', icon: '🔵', color: '#4D96FF' },
                { text: 'Yellow', speak: 'Yellow', icon: '🟡', color: '#FFD93D' },
                { text: 'Green', speak: 'Green', icon: '🟢', color: '#6BCB77' },
                { text: 'Purple', speak: 'Purple', icon: '🟣', color: '#A66CFF' },
                { text: 'Orange', speak: 'Orange', icon: '🟠', color: '#FF9F45' },
                { text: 'Pink', speak: 'Pink', icon: '', color: '#FD79A8' },
                { text: 'Black', speak: 'Black', icon: '⚫', color: '#2D3436' },
                { text: 'White', speak: 'White', icon: '⚪', color: '#DFE6E9' }
            ],
            animals: [
                { text: 'Cat', speak: 'Cat', icon: '🐱' },
                { text: 'Dog', speak: 'Dog', icon: '🐶' },
                { text: 'Bird', speak: 'Bird', icon: '🐦' },
                { text: 'Fish', speak: 'Fish', icon: '🐟' },
                { text: 'Duck', speak: 'Duck', icon: '🦆' },
                { text: 'Rabbit', speak: 'Rabbit', icon: '🐰' },
                { text: 'Bear', speak: 'Bear', icon: '🐻' },
                { text: 'Lion', speak: 'Lion', icon: '🦁' },
                { text: 'Frog', speak: 'Frog', icon: '🐸' },
                { text: 'Pig', speak: 'Pig', icon: '🐷' },
                { text: 'Cow', speak: 'Cow', icon: '🐮' },
                { text: 'Monkey', speak: 'Monkey', icon: '🐵' }
            ],
            transportations: [
                { text: 'Car', speak: 'Car', icon: '🚗' },
                { text: 'Bus', speak: 'Bus', icon: '🚌' },
                { text: 'Bike', speak: 'Bike', icon: '🚲' },
                { text: 'Plane', speak: 'Plane', icon: '✈️' },
                { text: 'Train', speak: 'Train', icon: '🚂' },
                { text: 'Boat', speak: 'Boat', icon: '🚢' },
                { text: 'Helicopter', speak: 'Helicopter', icon: '🚁' },
                { text: 'Truck', speak: 'Truck', icon: '🚚' },
                { text: 'Taxi', speak: 'Taxi', icon: '🚕' },
                { text: 'Rocket', speak: 'Rocket', icon: '🚀' },
                { text: 'Ambulance', speak: 'Ambulance', icon: '🚑' },
                { text: 'Police Car', speak: 'Police Car', icon: '🚓' }
            ],
            sea: [
                { text: 'Fish', speak: 'Fish', icon: '🐠' },
                { text: 'Octopus', speak: 'Octopus', icon: '🐙' },
                { text: 'Shark', speak: 'Shark', icon: '🦈' },
                { text: 'Dolphin', speak: 'Dolphin', icon: '🐬' },
                { text: 'Whale', speak: 'Whale', icon: '🐳' },
                { text: 'Crab', speak: 'Crab', icon: '🦀' },
                { text: 'Turtle', speak: 'Turtle', icon: '🐢' },
                { text: 'Seal', speak: 'Seal', icon: '🦭' },
                { text: 'Jellyfish', speak: 'Jellyfish', icon: '🪼' },
                { text: 'Shrimp', speak: 'Shrimp', icon: '🦐' },
                { text: 'Starfish', speak: 'Starfish', icon: '⭐' },
                { text: 'Seahorse', speak: 'Seahorse', icon: '🦄' }
            ]
        };

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        function initSpeech() {
            if (!synth) return;
            voices = synth.getVoices().filter(v => v.lang.startsWith('en'));
            if (voices.length === 0) voices = synth.getVoices();
            speechReady = true;
        }
        if (synth) {
            if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = initSpeech;
            initSpeech();
        }

        // iOS Safari audio unlock
        let audioUnlocked = false;
        function unlockAudio() {
            if (audioUnlocked) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) {
                    const ac = new AudioContext();
                    if (ac.state === 'suspended') ac.resume();
                }
            } catch (e) {}
            if (synth && !speechReady) initSpeech();
            audioUnlocked = true;
        }

        function speak(text, rate = 0.85) {
            unlockAudio();
            if (!synth || !speechReady) return;
            synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            u.rate = rate;
            u.pitch = 1.1;
            if (voices.length > 0) {
                const preferred = voices.find(v => v.name.includes('Google US English'))
                    || voices.find(v => v.name.includes('Samantha'))
                    || voices.find(v => v.name.includes('Female'))
                    || voices[0];
                u.voice = preferred;
            }
            synth.speak(u);
        }

        function speakChinese(text) {
            unlockAudio();
            if (!synth || !speechReady) return;
            synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN';
            u.rate = 1;
            u.pitch = 1.2;
            synth.speak(u);
        }

        class Bubble {
            constructor() {
                this.r = Math.min(width, height) * 0.09;
                if (this.r < 45) this.r = 45;
                if (this.r > 80) this.r = 80;
                this.x = this.r + Math.random() * (width - this.r * 2);
                this.y = height + this.r + 20;
                this.speed = 1.2 + Math.random() * 1.8;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.015 + Math.random() * 0.025;
                this.data = this.randomData();
                this.bgColor = this.data.color || '#4ECDC4';
            }
            randomData() {
                const pool = content[currentMode];
                return pool[Math.floor(Math.random() * pool.length)];
            }
            update() {
                this.y -= this.speed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.6;
                if (this.x < this.r) this.x = this.r;
                if (this.x > width - this.r) this.x = width - this.r;
            }
            draw() {
                ctx.save();
                const grad = ctx.createRadialGradient(
                    this.x - this.r * 0.3, this.y - this.r * 0.3, this.r * 0.1,
                    this.x, this.y, this.r
                );
                grad.addColorStop(0, '#ffffff');
                grad.addColorStop(0.25, lighten(this.bgColor, 30));
                grad.addColorStop(1, this.bgColor);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                ctx.lineWidth = 4;
                ctx.stroke();

                ctx.beginPath();
                ctx.ellipse(this.x - this.r * 0.35, this.y - this.r * 0.35, this.r * 0.18, this.r * 0.1, Math.PI / 4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.95)';
                ctx.fill();

                if (this.data.icon) {
                    ctx.font = `${this.r * 0.9}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.data.icon, this.x, this.y - this.r * 0.15);
                }

                ctx.font = `bold ${this.r * (currentMode === 'animals' || currentMode === 'transportations' || currentMode === 'sea' ? 0.38 : 0.55)}px "Microsoft YaHei", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = isDark(this.bgColor) ? '#fff' : '#333';
                ctx.shadowColor = 'rgba(0,0,0,0.15)';
                ctx.shadowBlur = 2;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                ctx.fillText(this.data.text, this.x, this.y + (this.data.icon ? this.r * 0.45 : this.r * 0.05));
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1;
                this.color = color;
                this.size = 6 + Math.random() * 10;
                this.shape = Math.random() > 0.4 ? 'circle' : 'star';
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.25;
                this.life -= 0.025;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.life * 6);
                if (this.shape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    drawStar(0, 0, 5, this.size, this.size / 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function lighten(hex, percent) {
            const num = parseInt(hex.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.min(255, (num >> 16) + amt);
            const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
            const B = Math.min(255, (num & 0x0000FF) + amt);
            return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }
        function isDark(hex) {
            const num = parseInt(hex.replace('#', ''), 16);
            const r = num >> 16;
            const g = (num >> 8) & 0xFF;
            const b = num & 0xFF;
            return (r * 0.299 + g * 0.587 + b * 0.114) < 128;
        }
        function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;
            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;
                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
        }

        function playTone(freq, duration, type = 'sine') {
            try {
                unlockAudio();
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }

        function playPop() {
            playTone(500 + Math.random() * 300, 0.12, 'sine');
        }
        function playSuccess() {
            try {
                unlockAudio();
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = f;
                    gain.gain.setValueAtTime(0, now + i * 0.08);
                    gain.gain.linearRampToValueAtTime(0.15, now + i * 0.08 + 0.03);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.18);
                    osc.start(now + i * 0.08);
                    osc.stop(now + i * 0.08 + 0.2);
                });
            } catch (e) {}
        }

        function spawnBubble() {
            bubbles.push(new Bubble());
        }

        function popBubble(index, isCorrect = true) {
            const b = bubbles[index];
            playPop();
            for (let i = 0; i < 12; i++) {
                particles.push(new Particle(b.x, b.y, b.bgColor));
            }
            bubbles.splice(index, 1);
            if (isCorrect) {
                score++;
                scoreEl.textContent = '⭐ ' + score;
                learnedSet.add(b.data.speak);
                if (score % 5 === 0) {
                    playSuccess();
                    setTimeout(() => speakChinese('真棒'), 300);
                }
            }
        }

        function setNewTarget() {
            const pool = content[currentMode];
            targetItem = pool[Math.floor(Math.random() * pool.length)];
            let label = '';
            if (currentMode === 'letters') label = '找字母：' + targetItem.text;
            else if (currentMode === 'numbers') label = '找数字：' + targetItem.text;
            else if (currentMode === 'colors') label = '找颜色：' + targetItem.icon + ' ' + targetItem.text;
            else if (currentMode === 'animals') label = '找动物：' + targetItem.icon + ' ' + targetItem.text;
            else if (currentMode === 'transportations') label = '找交通工具：' + targetItem.icon + ' ' + targetItem.text;
            else if (currentMode === 'sea') label = '找海洋生物：' + targetItem.icon + ' ' + targetItem.text;
            targetEl.innerHTML = label;
            setTimeout(() => {
                if (gameRunning) speak(targetItem.speak);
            }, 500);
        }

        function handleInput(x, y) {
            if (!gameRunning) return;
            // 触摸命中区域比视觉区域稍大，方便手指操作
            const touchPadding = Math.min(width, height) < 600 ? 15 : 10;
            for (let i = bubbles.length - 1; i >= 0; i--) {
                const b = bubbles[i];
                const dx = x - b.x;
                const dy = y - b.y;
                const hitR = b.r + touchPadding;
                if (dx * dx + dy * dy < hitR * hitR) {
                    speak(b.data.speak);
                    if (targetItem && b.data.speak === targetItem.speak) {
                        popBubble(i, true);
                        setNewTarget();
                    } else {
                        popBubble(i, false);
                        setTimeout(() => speak(targetItem.speak), 600);
                    }
                    return;
                }
            }
            playTone(300, 0.1, 'triangle');
            if (targetItem) {
                setTimeout(() => speakChinese('找' + (targetItem.icon ? targetItem.icon : '') + targetItem.text), 200);
            }
        }

        canvas.addEventListener('mousedown', e => {
            unlockAudio();
            handleInput(e.clientX, e.clientY);
        });
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            unlockAudio();
            const touches = e.changedTouches || e.touches;
            for (let i = 0; i < touches.length; i++) {
                handleInput(touches[i].clientX, touches[i].clientY);
            }
        }, { passive: false });

        // 防止双击缩放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', e => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, { passive: false });
        document.addEventListener('gesturestart', e => e.preventDefault());

        // 首次点击任意位置解锁音频
        ['click', 'touchstart', 'mousedown'].forEach(evt => {
            document.body.addEventListener(evt, unlockAudio, { once: true, passive: false });
        });

        function startGame(mode) {
            unlockAudio();
            currentMode = mode;
            if (synth && !speechReady) initSpeech();
            const map = {
                letters: { icon: '🔤', title: '字母模式', text: '泡泡里会飞出 A-Z 字母，<br>找到指定的字母，戳破它！<br>戳任何泡泡都能听英语发音哦～' },
                numbers: { icon: '🔢', title: '数字模式', text: '泡泡里有 1-10 的数字，<br>找到指定的数字，戳破它！<br>听英语学数字 One Two Three～' },
                colors: { icon: '🎨', title: '颜色模式', text: '泡泡是五颜六色的，<br>找到指定的颜色，戳破它！<br>Red 红色、Blue 蓝色、Yellow 黄色～' },
                animals: { icon: '🐱', title: '动物模式', text: '泡泡里有可爱的小动物，<br>找到指定的动物，戳破它！<br>Cat 猫咪、Dog 小狗、Bird 小鸟～' },
                transportations: { icon: '🚗', title: '交通工具模式', text: '泡泡里有各种交通工具，<br>找到指定的交通工具，戳破它！<br>Car 汽车、Plane 飞机、Train 火车～' },
                sea: { icon: '🐠', title: '海洋生物模式', text: '泡泡里有神秘的海洋生物，<br>找到指定的海洋生物，戳破它！<br>Fish 小鱼、Dolphin 海豚、Shark 鲨鱼～' }
            };
            const info = map[mode];
            teachIcon.textContent = info.icon;
            teachTitle.textContent = info.title;
            teachText.innerHTML = info.text;
            startScreen.classList.add('hidden');
            teachScreen.classList.remove('hidden');
            gameOverScreen.classList.add('hidden');
        }

        function closeTeach() {
            unlockAudio();
            teachScreen.classList.add('hidden');
            score = 0;
            scoreEl.textContent = '⭐ 0';
            bubbles = [];
            particles = [];
            learnedSet.clear();
            gameRunning = true;
            targetTimer = 0;
            setNewTarget();
            setTimeout(() => speakChinese('开始啦'), 200);
            loop();
        }

        function backToMenu() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            gameOverScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            targetEl.textContent = '找：🎉';
        }

        function endGame() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            finalScoreEl.textContent = '得分：' + score;
            const learnedArray = Array.from(learnedSet).slice(0, 8);
            learnedEl.innerHTML = '你学会了：' + (learnedArray.length > 0 ? learnedArray.join('、') : '好多英语发音！');
            gameOverScreen.classList.remove('hidden');
            setTimeout(() => {
                speakChinese('游戏结束，你真棒！');
            }, 400);
        }

        function loop() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, width, height);
            drawClouds();

            spawnTimer++;
            if (spawnTimer > 50) {
                spawnBubble();
                spawnTimer = 0;
            }

            for (let i = bubbles.length - 1; i >= 0; i--) {
                const b = bubbles[i];
                b.update();
                b.draw();
                if (b.y + b.r < -20) {
                    bubbles.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            }

            targetTimer++;
            if (targetTimer > 60 * 60) {
                endGame();
                return;
            }

            animationId = requestAnimationFrame(loop);
        }

        let cloudOffset = 0;
        function drawClouds() {
            cloudOffset += 0.15;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
            const clouds = [
                { x: 80, y: 90, s: 1 },
                { x: width - 140, y: 160, s: 0.85 },
                { x: width / 2, y: 70, s: 1.15 },
                { x: width / 3, y: 220, s: 0.55 }
            ];
            clouds.forEach(c => {
                let cx = (c.x + cloudOffset * c.s) % (width + 220) - 110;
                ctx.beginPath();
                ctx.arc(cx, c.y, 36 * c.s, 0, Math.PI * 2);
                ctx.arc(cx + 30 * c.s, c.y - 12 * c.s, 46 * c.s, 0, Math.PI * 2);
                ctx.arc(cx + 65 * c.s, c.y, 36 * c.s, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function bgLoop() {
            if (!gameRunning) {
                ctx.clearRect(0, 0, width, height);
                drawClouds();
                requestAnimationFrame(bgLoop);
            }
        }
        bgLoop();
    </script>
</body>
</html>
